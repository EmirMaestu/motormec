version: "3.9"

# =============================================================
# MOTORMEC — Ambiente Beta / Self-Hosted
# Levanta: PostgreSQL + API + SyncWorker + Nginx
# Uso: docker compose --env-file .env.beta up -d
# =============================================================

services:

  # -----------------------------------------------------------
  # BASE DE DATOS BETA
  # Puerto 5433 en el host (no colisiona con un postgres local)
  # -----------------------------------------------------------
  postgres_beta:
    image: postgres:16-alpine
    container_name: motormec_pg_beta
    restart: unless-stopped
    environment:
      POSTGRES_DB:       motormec_beta
      POSTGRES_USER:     motormec
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=es_AR.UTF-8"
    volumes:
      - pg_beta_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5433:5432"   # solo accesible desde localhost del VPS
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motormec -d motormec_beta"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------
  # API BACKEND (Fastify — se construye desde ../api)
  # -----------------------------------------------------------
  api_beta:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: motormec_api_beta
    restart: unless-stopped
    environment:
      NODE_ENV:             production
      DATABASE_URL:         postgres://motormec:${POSTGRES_PASSWORD}@postgres_beta:5432/motormec_beta
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:       15m
      CORS_ORIGIN:          ${CORS_ORIGIN:-*}
      PORT:                 3001
    depends_on:
      postgres_beta:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # SYNC WORKER — Convex → PostgreSQL (cada 5 minutos)
  # -----------------------------------------------------------
  sync_worker:
    build:
      context: ./sync
      dockerfile: Dockerfile
    container_name: motormec_sync
    restart: unless-stopped
    environment:
      CONVEX_URL:        ${CONVEX_URL}
      DATABASE_URL:      postgres://motormec:${POSTGRES_PASSWORD}@postgres_beta:5432/motormec_beta
      BETA_TENANT_ID:    ${BETA_TENANT_ID}
      SYNC_INTERVAL_MS:  300000
    depends_on:
      postgres_beta:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # -----------------------------------------------------------
  # NGINX — Reverse proxy + SSL termination
  # Maneja: beta.tudominio.com → api_beta:3001
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: motormec_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro       # certs de Certbot
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api_beta
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------
  # BACKUP AUTOMÁTICO — pg_dump diario a las 3:00 AM
  # Guarda en ./backups/ comprimido con gzip
  # Retiene los últimos 30 días
  # -----------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: motormec_backup
    restart: unless-stopped
    environment:
      PGPASSWORD:    ${POSTGRES_PASSWORD}
      PGHOST:        postgres_beta
      PGUSER:        motormec
      PGDATABASE:    motormec_beta
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "echo '0 3 * * * /backup.sh >> /backups/backup.log 2>&1' | crontab - && crond -f"
    depends_on:
      postgres_beta:
        condition: service_healthy

# -----------------------------------------------------------
# VOLUMES
# -----------------------------------------------------------
volumes:
  pg_beta_data:
    driver: local
  nginx_logs:
    driver: local
