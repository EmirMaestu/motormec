# =============================================================
# NGINX — Motormec Beta
# Proxy reverso hacia api_beta:3001
# SSL gestionado por Certbot
# =============================================================

# Rate limiting: máx 60 req/min por IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# Redirige todo HTTP → HTTPS
server {
    listen      80;
    server_name _;

    # Permite que Certbot valide el dominio (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Beta
server {
    listen      443 ssl;
    server_name beta.tudominio.com;   # <-- cambia a tu dominio real

    # Certificados generados por Certbot
    ssl_certificate     /etc/letsencrypt/live/beta.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.tudominio.com/privkey.pem;

    # Buenas prácticas SSL
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Headers de seguridad
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # ── Health check (sin auth, sin rate limit) ───────────────
    location = /health {
        proxy_pass         http://api_beta:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── API REST ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://api_beta:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Raíz: info básica ────────────────────────────────────
    location / {
        return 200 '{"status":"ok","env":"beta","version":"1.0.0"}';
        add_header Content-Type application/json;
    }

    # Logs
    access_log /var/log/nginx/beta_access.log;
    error_log  /var/log/nginx/beta_error.log warn;
}
